services:
  postgres:
    image: postgres:16-alpine
    container_name: operon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: operon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: operon_dev
    ports:
      - "5432:5432"
    volumes:
      - operon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d operon"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  operon_postgres_data: